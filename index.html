<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>拡張子なしファイル調査ツール</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="header">
      <div>
        <p class="subject">情報I 導入教材</p>
        <h1>拡張子なしファイル調査ツール</h1>
      </div>
      <div class="status" id="fileStatus">ファイル未選択</div>
    </section>

    <section class="workspace">
      <div class="file-panel">
        <label class="drop-zone" id="dropZone">
          <input id="fileInput" type="file" aria-label="拡張子なしファイルを選択">
          <span class="drop-title">ここにファイルを置く</span>
          <span class="drop-subtitle">またはクリックして選択</span>
        </label>

        <div class="file-info">
          <div>
            <span class="label">ファイル名</span>
            <strong id="fileName">-</strong>
          </div>
          <div>
            <span class="label">サイズ</span>
            <strong id="fileSize">-</strong>
          </div>
        </div>

        <div class="actions" aria-label="プレビュー形式を選ぶ">
          <button class="preview-button image" type="button" data-kind="image">画像として表示</button>
          <button class="preview-button audio" type="button" data-kind="audio">音声として再生</button>
          <button class="preview-button text" type="button" data-kind="text">テキストとして表示</button>
          <button class="preview-button binary" type="button" data-kind="binary">バイナリデータを表示</button>
        </div>
      </div>

      <div class="preview-panel">
        <div class="preview-head">
          <span class="label">プレビュー</span>
          <strong id="previewMode">未選択</strong>
        </div>
        <div class="preview-stage" id="previewStage">
          <p>ファイルを選んで、表示形式のボタンを押してください。</p>
        </div>
      </div>
    </section>

    <div class="reset-row">
      <button id="clearButton" type="button">リセット</button>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
